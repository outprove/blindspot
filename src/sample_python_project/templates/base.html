{{ define "base" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="wrap">
        <header class="site-header">
            <div class="header-main">
                <a class="brand brand-logo" href="/" aria-label="Blindspot home">
                    <img src="/static/blindspot-logo.svg" alt="Blindspot">
                </a>
            </div>
            <div class="header-tools">
                <nav class="nav">
                    <a href="/">Home</a>
                    {{ if .CurrentUser }}
                    <span class="nav-user">{{ .CurrentUser.Email }}</span>
                    <form action="/logout" method="post" class="nav-form">
                        <button type="submit" class="nav-button">Log out</button>
                    </form>
                    {{ else }}
                    <a href="/register">Register</a>
                    <a href="/login">Log in</a>
                    {{ end }}
                </nav>
            </div>
        </header>

        {{ if .ProfileLookupError }}
        <p class="form-message form-message-error header-message">{{ .ProfileLookupError }}</p>
        {{ end }}

        {{ template "content" . }}

        <footer class="site-footer">
            <nav class="footer-nav" aria-label="Footer">
                <a href="/about">About</a>
                <a href="/privacy">Privacy</a>
            </nav>
        </footer>
    </main>
</body>
</html>
{{ end }}
