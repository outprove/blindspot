{{ define "content" }}
<section class="auth-shell">
    <section class="auth-panel">
        <span class="eyebrow">Password Reset</span>
        <h1 class="auth-title">Choose a new password</h1>
        <p class="subtitle">Use a new password with at least 8 characters.</p>

        {{ if .Error }}
        <p class="form-message form-message-error">{{ .Error }}</p>
        {{ end }}

        {{ if .Success }}
        <p class="form-message form-message-success">{{ .Success }}</p>
        <p class="auth-meta"><a href="/login">Go to log in</a></p>
        {{ else }}
        <form action="/reset-password" method="post" class="auth-form">
            <input type="hidden" name="token" value="{{ .Token }}">

            <label class="field">
                <span>New password</span>
                <input type="password" name="password" minlength="8" required>
            </label>

            <label class="field">
                <span>Confirm password</span>
                <input type="password" name="password_confirm" minlength="8" required>
            </label>

            <button type="submit" class="primary-button">Save new password</button>
        </form>
        {{ end }}
    </section>
</section>
{{ end }}
